name: CI

on:
  pull_request:
  push:
    branches:
      - main

# Least privilege: CI only needs to read the repo contents.
permissions:
  contents: read

jobs:
  # sec-lockfile-integrity (HIGH): install strictly from the committed lockfile
  # and fail the build on any high-or-critical dependency advisory.
  security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # gitleaks needs full history to scan the commit range on push.
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      # `npm ci` installs strictly from package-lock.json and fails if the
      # lockfile is absent or inconsistent with package.json — the supply-chain
      # integrity gate for sec-lockfile-integrity.
      - name: Install dependencies (locked)
        run: npm ci

      # Fail the build on high+ severity advisories over the committed lockfile.
      - name: Audit dependencies (high+)
        run: npm audit --audit-level=high

      # sec-secret-scan-blocks-build (HIGH): block a build whose history or diff
      # contains a detectable secret. Mirrors the .husky/pre-commit hook so a
      # secret is caught even if a contributor lacks the local gitleaks binary.
      - name: Secret scan (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies (locked)
        run: npm ci

      - name: Lint (biome)
        run: npm run lint

      - name: Type-check
        run: npm run type-check

      - name: Unit tests
        run: npm run test:unit
