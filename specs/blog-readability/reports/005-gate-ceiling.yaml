gate: gate-ceiling
task_id: "005"
status: findings
findings:
  - id: gate-ceiling-1
    severity: critical
    category: spec-config
    title: Empty effective gate set on code-bearing task
    description: >
      Phase 1 gate-ceiling intersection (WF_SPEC_GATES ∩ ground_rules language tags)
      yielded zero gates for task 005. Task 005's ground_rules
      (frontend/styling.md, frontend/design-tokens.md, frontend/accessibility.md,
      testing/test-quality.md) contain no languages/<lang>.md entry, so no
      language tag was extracted. All five gates in the repo's .workflow.yml
      gate_pool (lint, format-check, type-check, unit-test, e2e-test) declare
      applies_to: [typescript, nextjs] - with no language tag on the task,
      none match, so the intersection is empty. Tasks 001-004 all included a
      languages/*.md ground rule and did not hit this.
    file: specs/blog-readability/tasks/005-typography-pass.md
    fix_proposal: >
      Add a languages/typescript/*.md (or languages/nextjs/*.md) ground_rules
      entry to task 005's frontmatter, matching the pattern used by tasks 001-004,
      then re-run /validate. Task's `empty_intersection_ok` is not set (defaults
      false), so this is fail-closed per ADR-003 rather than silently skipped.
    rationale: >
      ADR-003 fail-closed policy - an empty effective gate set on a code-bearing
      task must block `done`, not silently pass, since it would ship code with
      zero deterministic verification.
    review_status: accepted
    review_notes: >
      Added languages/typescript/react-patterns.md to task 005's ground_rules,
      matching the convention in tasks 002/003. Re-running /validate to
      recompute the effective gate set.
    source: tool
