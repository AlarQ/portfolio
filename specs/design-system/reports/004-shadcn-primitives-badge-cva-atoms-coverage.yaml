      next/font/google, and nothing in this diff touches layout.tsx or adds an
      Inter font-family token.
    file: src/app/layout.tsx
    lines: "4-4"
    fix_proposal: >
      Wire Inter as the font used by these primitives (add next/font/google
      Inter import and apply as the font-family token consumed by
      src/components/ui/*), or explicitly amend the task's acceptance text to
      drop the Inter requirement if the decision was to keep Geist - do not
      leave the acceptance criterion silently unmet.
    rationale: >
      Acceptance point 2 in the task's own Given/When/Then explicitly names
      Inter as part of the Figma light look; per-task coverage audit requires
      every acceptance point to be `covered`, not partially met.
    impact: >
      Rendered primitives visually diverge from the approved Figma design
      (wrong typeface) despite passing color-only checks - a reviewer or user
      comparing against Figma will see a mismatch this task claims to close.
    references: ["specs/design-system/tasks/004-shadcn-primitives-badge-cva-atoms.md#Acceptance"]
