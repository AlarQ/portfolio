original_verdict: needs-revision
summary: >
  design-system spec bundle is internally strong on FR->task traceability (all
  FR-1..FR-11 owned; no orphan tasks) and the blocked_by graph is a clean acyclic
  DAG. One blocking repo-architecture contradiction: FR-10 / task 009 specify a
  GitHub Actions ci.yml gate that "fails the deploy", but this repo's documented
  model is "GitHub Actions runs no checks; Vercel deploys; pre-push is the
  authoritative gate" and no ci.yml exists. Four warnings (wrong module for the
  Post type; two DAG-vs-verification-intent ordering gaps on 008/009; a wrong ADR
  citation) and several low notes.
counts:
  blocking_issues: 1
  warnings: 4
  notes: 7

blocking_issues:
  - location: >
      tasks/009-storybook-prod-exclusion-ci.md (estimated_files +
      integration_seams + Acceptance #3); spec.md FR-10 &
      sec-storybook-excluded-from-prod (lines 126-133, 342-348);
      test-strategy.md lines 157, 332-334
    issue: >
      Task 009 and FR-10 specify a CI gate wired into `.github/workflows/ci.yml`
      ("a CI check fails the deploy if any Storybook output is found"), with
      estimated_files listing `.github/workflows/ci.yml` and
      `scripts/check-no-storybook-in-build.sh`. This contradicts the repo's
      documented CI architecture and references infrastructure the repo
      deliberately does not have. `.husky/pre-push` states verbatim: "Pre-push is
      the authoritative quality + supply-chain gate. GitHub Actions is reserved
      for deployment (Vercel); it runs no checks." The only workflow present is
      `.github/workflows/release.yml` (tag/release on push to main) - there is no
      `ci.yml`, and deploys go through Vercel independently of GitHub Actions, so
      a GH-Actions check cannot "fail the deploy". The established repo pattern
      for exactly this kind of gate is a vitest regression test under
      `src/security/` that asserts the pre-push hook contains the step (see
      `src/security/ci-supply-chain.test.ts` and `src/security/secret-scan.test.ts`).
    recommendation: >
      Rework task 009 (and soften FR-10 / sec-storybook-excluded-from-prod
      wording) to match the repo model: implement the exclusion assertion as a
      vitest test under `src/security/` (e.g. `storybook-prod-exclusion.test.ts`)
      that scans the `next build` output for storybook-static/ and *.stories.*
      chunks, and add the enforcing step to `.husky/pre-push` (not a new ci.yml).
      Drop `.github/workflows/ci.yml` from estimated_files, or explicitly scope
      009 to CREATE a first-ever CI workflow AND reconcile it with the "Actions
      runs no checks" decision in pre-push/CLAUDE-context - do not silently assume
      a ci.yml that both is absent and is documented as intentionally check-free.

warnings:
  - location: >
      spec.md FR-8 line 279 & scenario pages-use-real-post-type; design.md line 66
      (PostType node); tasks/005 Acceptance #5 + Approach line 58; tasks/007
      Approach line 46; test-strategy.md lines 5, 97, 121
    issue: >
      The bundle repeatedly names "the actual `Post` type from `postLoader.ts`"
      as the fixture type source. In the real repo the `Post` interface is
      declared and exported from `src/data/posts.ts`; `src/data/postLoader.ts`
      only does `import type { Post } from "./posts"` and does NOT re-export it
      (its exports are RawPostFile, buildPostSet, PostAdjacency, getAdjacentPosts).
      An import `from "@/data/postLoader"` for `Post` would not resolve. Note the
      field list quoted in the spec (slug, title, dek, date, readingTimeMinutes,
      formattedDate, published) exactly matches `src/data/posts.ts` - only the
      module path is wrong. (Conversely, FR-11's references to `buildPostSet` in
      `postLoader.ts` ARE correct.) Also tasks 005/007 say "do not modify the type
      - FR-11", but FR-11's byte-unchanged set is postLoader.ts + mdxPresentation.tsx,
      not posts.ts where the type actually lives.
    recommendation: >
      Change every "Post type from postLoader.ts" reference to
      `src/data/posts.ts` (fixtures should `import type { Post } from "@/data/posts"`).
      Keep buildPostSet/mdxPresentation references pointed at postLoader.ts /
      mdxPresentation.tsx (those are correct). This is load-bearing because FR-8's
      whole guardrail is a `tsc --noEmit` compile-error on the real Post shape.

  - location: >
      tasks/008-light-dark-theming.md frontmatter blocked_by ["002","004"];
      test-strategy.md lines 143, 336-338 (integration seam "validates 004-006")
    issue: >
      Task 008's integration proof is stated as "the 'zero per-component diff'
      proof validates that 004-006's semantic-only binding actually held", but
      008's blocked_by is only [002, 004]. Under `branch_strategy: per-task`, 008
      can complete before tasks 005 (molecules) and 006 (organisms) merge, so its
      zero-component-diff proof would only exercise the atom layer (004) and could
      not validate 005/006's bindings - directly weakening the claim the seam is
      supposed to back.
    recommendation: >
      Add 005 and 006 to task 008's blocked_by (or narrow the integration-seam
      claim to "validates 004's binding" and defer molecule/organism validation).
      Preferably make dark theming depend on the full component set it audits.

  - location: >
      tasks/009-storybook-prod-exclusion-ci.md blocked_by ["001","004"];
      test-strategy.md line 334
    issue: >
      test-strategy rationale for 009 states "009 runs last against the real
      npm run build artifact after all stories (004-007) exist - only then can the
      exclusion scan see the full story surface... Owning it earlier (e.g. 001)
      would test an incomplete story set." Yet 009's blocked_by is only [001, 004],
      so nothing prevents 009 from running before 005/006/007 stories exist -
      exactly the incomplete-story-surface scan the rationale says to avoid,
      yielding a false pass.
    recommendation: >
      Add 007 to 009's blocked_by (007 transitively pulls 005/006 via 006<-005),
      so the exclusion scan only runs once the full story/fixture surface exists.

  - location: tasks/004-shadcn-primitives-badge-cva-atoms.md Approach line 65
    issue: >
      "Model Badge per FR-6 / ADR-DS-4 as an exhaustive class-variance-authority
      map." ADR-DS-4 is the AA-contrast accepted-risk ADR (#7F56D9), unrelated to
      the Badge CVA taxonomy. There is no badge-specific ADR in design.md
      (ADR-DS-1..7 cover adapter, coexistence, token codegen, AA-contrast, dark
      palette, lint, hex). The badge exhaustiveness requirement is FR-6 only.
    recommendation: >
      Drop the "ADR-DS-4" citation here; reference FR-6 (and the skillPresentation
      Record<IconKey,...> analogue) alone, or add a dedicated ADR if one is wanted.

