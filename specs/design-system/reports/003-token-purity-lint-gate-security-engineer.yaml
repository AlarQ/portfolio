gate: security-engineer
task_id: 003-token-purity-lint-gate
status: findings
findings:
- id: sec-001
  severity: medium
  category: design-tokens
  file: grit/no-direct-palette-import.grit
  lines: 7-18
  description: 'The two import-shaped rules only match static `import $imports from $src` and `import
    * as $ns from $nsSrc` forms. They do not match a bare re-export (`export { primitives } from "../theme/tokens"`
    or `export * from "../theme/tokens"`), a dynamic import (`await import("../theme/tokens")`), or a
    CommonJS `require("../theme/tokens")`. Any of these reaches the primitive layer from component source
    without tripping the gate, silently defeating the FR-3 semantic-only-consumption invariant the rule
    exists to enforce.

    '
  source: llm
  review_status: rejected
  review_notes: 'Rejected: medium severity assumes external/adversarial contributor threat model; repo
    is 100% self-authored with zero external contributors (CLAUDE.md). Real risk is accidental self-drift,
    not evasion. Revisit if external contributions are ever accepted.'
- id: sec-002
  severity: low
  category: design-tokens
  file: grit/no-direct-palette-import.grit
  lines: 8,15
  description: 'The path regex `r"[^"]*theme/tokens"` requires the import specifier string to end exactly
    at `theme/tokens` before the closing quote. An import written with an explicit extension, e.g. `from
    "../theme/tokens.ts"` or `from "../theme/tokens.js"`, does not match and silently bypasses both the
    named-import and namespace-import checks.

    '
  source: llm
  review_status: rejected
  review_notes: 'Rejected: attempted extension-tolerant regex fix `(?:\.tsx?|\.jsx?)?` broke Biome Grit
    plugin compilation (same GritQL fragility as cq-002). Reverted; not safely fixable without further
    GritQL syntax investigation.'
- id: sec-003
  severity: low
  category: architecture
  file: grit/no-direct-palette-import.grit
  lines: 3,10,16
  description: 'The exemption regex `.*/theme/(?:theme|tokens)\.ts$` is a filename-suffix match, not an
    anchored repo-root path. Any file anywhere in the tree ending in `.../theme/theme.ts` or `.../theme/tokens.ts`
    is treated as the trusted authoring layer and fully exempted from both checks. Low likelihood given
    current repo shape, but worth tightening to an absolute/rooted path if the tree grows a second `theme/`
    dir.

    '
  source: llm
  review_status: rejected
  review_notes: 'Rejected: attempted repo-root-anchored filename regex broke Biome Grit plugin compilation.
    Reverted; current suffix-match exemption kept as-is.'
- id: sec-004
  severity: low
  category: dependency-hygiene
  file: package.json
