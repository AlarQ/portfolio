findings:
  - id: cqp-1
    severity: low
    category: threshold-magic
    title: Threshold value justified only by fitting the example, not a real design decision
    description: >
      LOW_MVP_PROGRESS_THRESHOLD = 10 is chosen (per the task file's own notes) to be "the smallest round threshold that satisfies [mvpProgress:5 must be muted] without being arbitrary noise like 7 or 12" - i.e. reverse-engineered from a single test example rather than derived from any product/design requirement. This is exactly the kind of unexplained magic-number threshold that later needs re-justifying when someone asks "why 10 and not 15 or 20?".

    file: src/utils/projectPresentation.tsx
    lines: "27-27"
    code_snippet: "const LOW_MVP_PROGRESS_THRESHOLD = 10;"
    fix_proposal: >
      No code change needed, but strengthen the comment to state this is a provisional/design-owner-agreed value pending real product input, so future readers don't assume 10 is derived from data.

    rationale: >
      frontend/components.md and general code-quality prelude favor explicit, justified constants over incidental ones; a threshold justified purely by "not looking arbitrary" is itself a smell.

    impact: Low - cosmetic risk only; someone may need to revisit the threshold later without real guidance on why 10 was picked.
    references: ["frontend/components.md"]
    confidence: medium
    review_status: accepted
    source: llm
    rule_added: true
  - id: cqp-2
    severity: low
    category: dry-violation
    title: mvpProgress muted-tone branch duplicated by call-site pass-through, not centralized guard
    description: >
      Both ProjectSummary.tsx and ProjectTabStrip.tsx now pass `project.mvpProgress` positionally to `projectPresentation`. This is fine and matches the seam pattern, but there is no compile-time link ensuring every future consumer of `projectPresentation` remembers to forward `mvpProgress` - a new call site that omits the second argument silently reverts to un-muted behavior with no lint/type signal. This is a minor "premature-optional-param" smell: an easy way to forget the muting rule.

    file: src/utils/projectPresentation.tsx
    lines: "39-43"
    code_snippet: |
      export function projectPresentation(status: Status, mvpProgress?: number): StatusPresentation {
        const { tone, label } = STATUS_PRESENTATION[status];
        const resolvedTone = mvpProgress !== undefined && isLowMvpProgress(mvpProgress) ? "muted" : tone;
        return { tone: resolvedTone, label, dot: resolvedTone };
      }
    fix_proposal: >
      Optional, not blocking: consider accepting `Pick<Project, "status" | "mvpProgress">` instead of two positional params, so a caller naturally passes the whole project slice and can't drop `mvpProgress` by forgetting a second argument. Given only two call sites exist today, this is a "nice to have," not required.

    rationale: >
      languages/typescript/type-safety.md favors encoding invariants in types; optional trailing params are easy to silently omit at new call sites.

    impact: Low - a future third consumer could ship un-muted low-mvpProgress projects without any error, only a behavioral bug caught in review/QA.
    references: ["languages/typescript/type-safety.md"]
    confidence: low
    review_status: rejected
    review_notes: "Rejected - optional/not required; only two call sites exist and the finding itself says the Pick<> refactor is a nice-to-have. Keep the simple (status, mvpProgress?) signature; revisit if a 3rd consumer appears. Not promoted to KB."
    source: llm
  - id: cqp-3
    severity: info
    category: unrelated-scope
    title: Coverage-gate tooling bundled into a small FR-3 task diff
    description: >
      The task is scoped to a small presentation-seam change (optional param + pure predicate), but the diff also introduces a new 177-line scripts/check-diff-coverage.mjs, vitest.config.ts coverage block, package.json script changes, and a pre-push hook rewrite. This is legitimate infra work but is unrelated to FR-3 and inflates the "task" diff beyond its stated intent, making the actual behavioral change harder to review in isolation.

    file: scripts/check-diff-coverage.mjs
    lines: "1-177"
    code_snippet: "// Diff-coverage gate (see .husky/pre-push): the lines this branch adds/changes..."
    fix_proposal: >
      Split coverage-tooling changes into a separate commit/PR from the FR-3 behavioral fix, so each is independently revertable and reviewable.

    rationale: >
      Small, focused changesets are easier to review and revert; mixing unrelated infra changes with a targeted bugfix violates the "small PR" spirit even though neither part is over-engineered on its own.

    impact: Low - no functional risk, but harder git-blame/revert story if the coverage gate needs to be rolled back independently of the mvpProgress fix.
    references: ["testing/structure.md"]
    confidence: medium
    review_status: noted
    source: llm
